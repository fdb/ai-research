name: Deploy site

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: gh-pages
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Stage site
        run: |
          mkdir -p _site
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='_site' \
            ./ _site/

      - name: Publish to gh-pages root
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: _site
          branch: gh-pages
          clean: true
          clean-exclude: |
            pr-*
          commit-message: "Deploy ${{ github.sha }}"
          single-commit: false
